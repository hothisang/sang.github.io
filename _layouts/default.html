<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page.title }} | {{ site.title }}</title>
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f7f9fc;
  color: #333;
}

/* ===== HEADER ===== */
.header {
  background: #24292e;
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.header-inner {
  max-width: 1200px;
  margin: auto;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 20px;
  margin: 0;
}

nav a {
  color: #ccc;
  margin-left: 16px;
  text-decoration: none;
  font-size: 14px;
}

nav a:hover {
  color: white;
}

/* ===== LAYOUT ===== */
.layout {
  display: flex;
  max-width: 1200px;
  margin: 0 auto;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 260px;
  padding: 30px 20px;
  position: sticky;
  top: 70px;
  height: calc(100vh - 70px);
  overflow-y: auto;
  border-right: 1px solid #eee;
  background: #fff;
}

/* TOC */
#sidebar a {
  display: block;
  color: #555;
  text-decoration: none;
  font-size: 14px;
  margin-bottom: 8px;
  transition: all 0.2s;
}

#sidebar a:hover {
  color: #000;
}

#sidebar a.active {
  color: #0969da;
  font-weight: 600;
}

/* indent */
.toc-h2 {
  margin-left: 10px;
}

.toc-h3 {
  margin-left: 20px;
  font-size: 13px;
  color: #777;
}

/* ===== MAIN ===== */
main {
  flex: 1;
  padding: 40px;
  background: white;
  min-height: 100vh;
}

/* CONTENT */
main h1, main h2, main h3 {
  margin-top: 32px;
}

main p {
  line-height: 1.7;
}

main code {
  background: #f1f3f5;
  padding: 3px 6px;
  border-radius: 4px;
}

main pre {
  background: #282c34;
  color: #eee;
  padding: 16px;
  border-radius: 6px;
  overflow-x: auto;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 30px;
  color: #777;
  font-size: 14px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .layout {
    flex-direction: column;
  }

  #sidebar {
    position: relative;
    width: 100%;
    height: auto;
    border-right: none;
    border-bottom: 1px solid #eee;
  }

  main {
    padding: 20px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <h1>{{ site.title }}</h1>

    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/guide' | relative_url }}">Guide</a>
      <a href="{{ '/about' | relative_url }}">About</a>
    </nav>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">
  
  <!-- SIDEBAR -->
  <aside id="sidebar"></aside>

  <!-- CONTENT -->
  <main class="markdown-body">
    {{ content }}
  </main>

</div>

<!-- FOOTER -->
<footer>
  © {{ site.time | date: "%Y" }} {{ site.title }}
</footer>

<!-- SCRIPT: TOC + ACTIVE SCROLL -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const sidebar = document.getElementById("sidebar");
  const headings = document.querySelectorAll(".markdown-body h1, .markdown-body h2, .markdown-body h3");

  const links = [];

  headings.forEach((heading, index) => {

    if (!heading.id) {
      heading.id = "heading-" + index;
    }

    const link = document.createElement("a");
    link.href = "#" + heading.id;
    link.textContent = heading.textContent;

    if (heading.tagName === "H2") link.classList.add("toc-h2");
    if (heading.tagName === "H3") link.classList.add("toc-h3");

    sidebar.appendChild(link);
    links.push(link);
  });

  // ACTIVE SCROLL
  window.addEventListener("scroll", () => {
    let current = "";

    headings.forEach((heading) => {
      const rect = heading.getBoundingClientRect();
      if (rect.top <= 120) {
        current = heading.id;
      }
    });

    links.forEach(link => {
      link.classList.remove("active");
      if (link.getAttribute("href") === "#" + current) {
        link.classList.add("active");
      }
    });
  });

});
</script>

</body>
</html>
